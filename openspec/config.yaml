schema: spec-driven

# Project context (optional)
# This is shown to AI when creating artifacts.
context: |
  Single source of truth: docs/base-standards.md (reglas mínimas + punteros). Estándares detallados se cargan bajo demanda según tipo de ticket, no todos a la vez.

  Product and backlog (ticket changes — use extract script, NOT full product-backlog.md):
  - npm run openspec:extract-ticket -- --ticket T-XX-YY — ticket + US + sprint + metadatos
  - docs/product-backlog-list.md — índice de tickets y sprints (si hace falta orientación)
  - docs/prd.md — solo si el ticket requiere contexto de producto no cubierto por el extract

  OpenSpec tasks (al crear tasks.md; NOT during apply):
  - docs/openspec/tasks-core.md — reglas, §0, secuencia, patrón tasks.md por referencia
  - docs/openspec/tasks-by-type.md — matriz unit/curl/e2e/docs por tipo de ticket
  - docs/openspec/templates/ — plantillas de informes (solo al generar reports en apply)

  Standards (load ONE primary doc by ticket type + contracts only if API/DB touched):
  - Backend/API: docs/backend-standards.md, docs/api-spec.yml
  - Frontend/UI: docs/frontend-standards.md
  - Domain/DB: docs/data-model.md
  - Infra/tooling: docs/development_guide.md
  - docs/documentation-standards.md — solo al actualizar documentación técnica

  OpenSpec workflow conventions:
  - One change per development ticket (T-XX-YY), processed in sprint order from product-backlog.md
  - Change name: t-[US]-[SEQ]-[short-kebab-name] (e.g. t-13-01-habit-domain-types)
  - Git branch: feature/[TICKET-ID]-[short-kebab-name] (e.g. feature/T-13-01-habit-domain-types)
  - Git commits: NO commits during /opsx:apply; single commit with bullet-point message only when user accepts and /opsx:archive runs (then push feature branch to remote, then merge to develop)
  - On /opsx:archive (last step after mv to archive/): attempt `npm run openspec:mark-ticket -- --change <name>` to set **Estado en código** to ✅ Implementado in docs/product-backlog.md section 4; if it fails, archive is still complete — fix backlog manually later
  - Documentation language: Spanish; code identifiers: English
  - The backlog may describe greenfield; always inspect existing code and reflect actual repo state in artifacts

# Per-artifact rules (optional)
rules:
  proposal:
    - Always reference Ticket ID (T-XX-YY) and User Story (US-XX) in the header
    - Include a "Non-goals" section scoped strictly to the ticket
    - Do not expand scope beyond the ticket DoD in product-backlog.md
    - Link acceptance criteria to Gherkin scenarios from the parent US
    - Write in Spanish
  specs:
    - Translate ticket DoD and parent US Gherkin AC into verifiable scenarios
    - One capability folder per logical feature area affected by the ticket
    - Use WHEN/THEN/AND structure aligned with BDD from the backlog
    - Do not invent requirements absent from backlog, PRD, or api-spec/data-model
  design:
    - Read existing code before proposing new structure; prefer extending over duplicating
    - Backend tickets: follow Clean Architecture layers in backend-standards.md
    - Frontend tickets: follow presentation/application/domain/infrastructure layers in frontend-standards.md
    - Infra/tooling tickets: align with development_guide.md and current package.json scripts
    - Call out dependencies on prior tickets/sprints when relevant
    - Write in Spanish; code paths and identifiers in English
  tasks:
    - Follow docs/openspec/tasks-core.md and docs/openspec/tasks-by-type.md (reference pattern; do NOT inline report templates)
    - Header MUST include Ticket, US, Change, Rama, and line "Pasos aplicables: unit|curl|e2e|docs" per tasks-by-type matrix
    - Paso 0 MUST be first: branch feature/[ticket-id]-[ticket-name] from develop (→ tasks-core §0)
    - Mandatory verification steps: reference tasks-core §N+1..§Cierre; link report path under openspec/changes/<name>/reports/
    - Do NOT include git commit subtasks in implementation sections; commit only at archive (tasks-core §Cierre)
    - Single blank line between sections in tasks.md, not between every checkbox
    - Include concrete project commands (npm run dev, npm run dev:api, docker compose, prisma, curl examples)
    - Map each implementation subtask to a checklist item from the ticket DoD
    - Mark mandatory steps with (OBLIGATORIO)
    - Write in Spanish
