openapi: 3.0.0
info:
  title: API ConRutina
  description: |
    API REST de ConRutina, aplicaci?n de seguimiento de h?bitos con sistema de recompensas.
    
    Sigue principios de Clean Architecture y una arquitectura por capas para gestionar h?bitos de forma escalable.
    
    ## Funcionalidades
    - Gesti?n del perfil de usuario
    - Seguimiento de h?bitos con estado diario de completitud
    - Gesti?n y canje de recompensas
    - Vistas de calendario semanal
    - Sistema de puntos y penalizaciones
    
  version: 0.0.1
  contact:
    name: Equipo de desarrollo ConRutina
  license:
    name: ISC
    
servers:
  - url: http://localhost:3001
    description: Servidor API de desarrollo (Node/Express)
  - url: http://localhost:5173
    description: Servidor frontend de desarrollo (Vite con proxy)

paths:
  /health:
    get:
      summary: Health check del API
      description: Indica que el proceso del servidor Express est? disponible
      tags:
        - Sistema
      responses:
        '200':
          description: Servidor disponible
          content:
            application/json:
              schema:
                type: object
                required:
                  - status
                  - timestamp
                properties:
                  status:
                    type: string
                    example: ok
                  timestamp:
                    type: string
                    format: date-time
                    example: "2026-05-30T12:00:00.000Z"

  /api/profile:
    get:
      summary: Obtener perfil de usuario
      description: Devuelve la informaci?n del perfil (actualmente fijado al usuario con id=1)
      tags:
        - Usuario
      responses:
        '200':
          description: Perfil obtenido correctamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserProfile'
              example:
                id: 1
                name: "Demo User"
                email: "demo@ConRutina.app"
                avatarUrl: null
        '404':
          description: Usuario no encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
              example:
                code: "USER_NOT_FOUND"
                message: "Usuario no encontrado"
        '500':
          description: Error interno del servidor
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
              example:
                code: "INTERNAL_ERROR"
                message: "Error interno del servidor"

  # Endpoints futuros (planificados):
  
  /api/habits:
    get:
      summary: Listar h?bitos activos
      description: Obtiene todos los h?bitos activos del usuario (userId=1 en MVP sin auth)
      tags:
        - H?bitos
      responses:
        '200':
          description: Lista de h?bitos obtenida correctamente
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/HabitApi'
        '500':
          description: Error interno del servidor
    
    post:
      summary: Crear h?bito
      description: Crea un nuevo h?bito para seguimiento
      tags:
        - H?bitos
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateHabitRequest'
      responses:
        '201':
          description: H?bito creado correctamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HabitApi'
        '400':
          description: Error de validaci?n
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
              example:
                code: VALIDATION_ERROR
                message: Datos inv?lidos
                details:
                  - field: name
                    message: El nombre es obligatorio
        '500':
          description: Error interno del servidor

  /api/habits/{id}:
    patch:
      summary: Actualizar h?bito
      description: Actualiza parcialmente un h?bito existente (userId=1 en MVP sin auth). Solo muta la tabla Habit; los snapshots WeekHabit permanecen inmutables.
      tags:
        - H?bitos
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
          description: Identificador num?rico del h?bito
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateHabitRequest'
      responses:
        '200':
          description: H?bito actualizado correctamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HabitApi'
        '400':
          description: Error de validaci?n
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
              example:
                code: VALIDATION_ERROR
                message: Datos inv?lidos
                details:
                  - field: input
                    message: Debe proporcionar al menos un campo para actualizar
        '404':
          description: H?bito no encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
              example:
                code: HABIT_NOT_FOUND
                message: H?bito no encontrado
        '500':
          description: Error interno del servidor
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'

    delete:
      summary: Desactivar h?bito
      description: Baja l?gica del h?bito (isActive=false). No elimina filas WeekHabit ni muta snapshots hist?ricos.
      tags:
        - H?bitos
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
          description: Identificador num?rico del h?bito
      responses:
        '204':
          description: H?bito desactivado correctamente (sin cuerpo)
        '404':
          description: H?bito no encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
              example:
                code: HABIT_NOT_FOUND
                message: H?bito no encontrado
        '500':
          description: Error interno del servidor
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'

  /api/weeks/current:
    get:
      summary: Obtener la semana activa del usuario
      description: >
        Devuelve la semana activa con WeekHabits, HabitEntries y estad?sticas calculadas.
        Si ha cambiado de semana ISO, bloquea la anterior y crea la nueva con entries pending.
      tags:
        - Semanas
      responses:
        '200':
          description: Semana activa encontrada o creada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WeekResponse'
        '500':
          description: Error interno del servidor
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'

  /api/weeks:
    get:
      summary: Obtener semana por offset respecto a la semana ISO actual
      description: >
        offset=0 equivale a /api/weeks/current (incluye lockWeekAndTransition).
        offset negativo devuelve semanas hist?ricas sin mutar BD.
      tags:
        - Semanas
      parameters:
        - in: query
          name: offset
          required: false
          schema:
            type: integer
            default: 0
          description: Desplazamiento en semanas (0=actual, -1=anterior, etc.)
      responses:
        '200':
          description: Semana encontrada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WeekResponse'
        '400':
          description: Par?metro offset inv?lido
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
              example:
                code: VALIDATION_ERROR
                message: Datos inv?lidos
                details:
                  - field: offset
                    message: El offset debe ser un n?mero entero
        '404':
          description: Semana no encontrada en el offset solicitado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
              example:
                code: WEEK_NOT_FOUND
                message: Semana no encontrada
        '500':
          description: Error interno del servidor
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'

  /api/habit-entries/{id}:
    patch:
      summary: Actualizar estado de entrada diaria
      description: >
        Actualiza el estado de completitud de una HabitEntry (userId=1 en MVP sin auth).
        Rechaza la operaci?n si la semana padre est? bloqueada (isLocked=true).
      tags:
        - Semanas
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
          description: Identificador num?rico de la entrada diaria
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateHabitEntryRequest'
      responses:
        '200':
          description: Entrada actualizada correctamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HabitEntryResponse'
        '400':
          description: Error de validaci?n
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
              example:
                code: VALIDATION_ERROR
                message: Datos inv?lidos
                details:
                  - field: status
                    message: Debe ser pending, completed o failed
        '404':
          description: Entrada de h?bito no encontrada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
              example:
                code: HABIT_ENTRY_NOT_FOUND
                message: Entrada de h?bito no encontrada
        '409':
          description: Semana bloqueada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
              example:
                code: WEEK_LOCKED
                message: No se puede modificar una semana bloqueada
        '500':
          description: Error interno del servidor
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'

  /api/habits/{id}/toggle/{dayIndex}:
    post:
      summary: Alternar completitud del h?bito (PLANIFICADO)
      description: Cambia el estado de completitud de un d?a concreto
      tags:
        - H?bitos
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
          description: Identificador del h?bito
        - in: path
          name: dayIndex
          required: true
          schema:
            type: integer
            minimum: 0
            maximum: 6
          description: ??ndice del d?a (0-6, domingo a s?bado)
      responses:
        '200':
          description: Estado del h?bito actualizado correctamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Habit'
        '404':
          description: H?bito no encontrado
        '500':
          description: Error interno del servidor

  /api/rewards:
    get:
      summary: Listar recompensas activas
      description: Obtiene todas las recompensas activas del usuario (userId=1 en MVP sin auth)
      tags:
        - Recompensas
      responses:
        '200':
          description: Lista de recompensas activas obtenida correctamente
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Reward'
        '500':
          description: Error interno del servidor
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
    
    post:
      summary: Crear recompensa
      description: Crea una nueva recompensa activa (userId=1 en MVP sin auth)
      tags:
        - Recompensas
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateRewardRequest'
      responses:
        '201':
          description: Recompensa creada correctamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Reward'
        '400':
          description: Error de validaci?n
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
              example:
                code: VALIDATION_ERROR
                message: Datos inv?lidos
                details:
                  - field: cost
                    message: El coste debe ser mayor que 0
        '500':
          description: Error interno del servidor
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'

  /api/rewards/{id}:
    delete:
      summary: Desactivar recompensa
      description: Baja l?gica de la recompensa (isActive=false). No elimina filas RewardRedemption.
      tags:
        - Recompensas
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
          description: Identificador num?rico de la recompensa
      responses:
        '204':
          description: Recompensa desactivada correctamente (sin cuerpo)
        '404':
          description: Recompensa no encontrada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
              example:
                code: REWARD_NOT_FOUND
                message: Recompensa no encontrada
        '500':
          description: Error interno del servidor
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'

  /api/rewards/{id}/redeem:
    post:
      summary: Canjear recompensa (PLANIFICADO)
      description: Canjea una recompensa usando los puntos acumulados
      tags:
        - Recompensas
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
          description: Identificador de la recompensa
      responses:
        '200':
          description: Recompensa canjeada correctamente
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Recompensa canjeada correctamente"
                  remainingPoints:
                    type: integer
                    description: Puntos restantes tras el canje
        '400':
          description: Puntos insuficientes
        '404':
          description: Recompensa no encontrada
        '500':
          description: Error interno del servidor

components:
  schemas:
    UserProfile:
      type: object
      properties:
        id:
          type: integer
          description: Identificador ?nico del usuario
        name:
          type: string
          nullable: true
          description: Nombre completo del usuario
        email:
          type: string
          format: email
          description: Correo electr?nico del usuario
        avatarUrl:
          type: string
          nullable: true
          description: URL del avatar del usuario
      required:
        - id
        - email

    Habit:
      type: object
      description: Contrato frontend (UI) con racha y estado semanal; no usado en GET/POST /api/habits del backend
      properties:
        id:
          type: string
          description: Identificador ?nico del h?bito
        emoji:
          type: string
          description: Emoji que representa el h?bito
        name:
          type: string
          description: Nombre del h?bito
        pointsPerDay:
          type: integer
          description: Puntos al completar el h?bito
        penalty:
          type: integer
          description: Puntos descontados si falla el h?bito
        streak:
          type: integer
          description: Racha actual de d?as consecutivos completados
        completionStatus:
          type: array
          items:
            type: string
            enum: [completed, failed, pending]
          description: Array de 7 estados (uno por d?a de la semana)
      required:
        - id
        - emoji
        - name
        - pointsPerDay
        - penalty
        - streak
        - completionStatus

    HabitApi:
      type: object
      description: Respuesta de persistencia para GET/POST/PATCH /api/habits
      properties:
        id:
          type: integer
          description: Identificador ?nico del h?bito
        userId:
          type: integer
          description: ID del usuario propietario
        emoji:
          type: string
          description: Emoji que representa el h?bito
        name:
          type: string
          description: Nombre del h?bito
        pointsPerDay:
          type: integer
          description: Puntos al completar el h?bito
        penalty:
          type: integer
          description: Puntos descontados si falla el h?bito
        isActive:
          type: boolean
          description: Indica si el h?bito est? activo (soft delete)
        createdAt:
          type: string
          format: date-time
          description: Fecha de creaci?n del h?bito
      required:
        - id
        - userId
        - emoji
        - name
        - pointsPerDay
        - penalty
        - isActive
        - createdAt

    CreateHabitRequest:
      type: object
      properties:
        emoji:
          type: string
          description: Emoji que representa el h?bito
        name:
          type: string
          description: Nombre del h?bito
        pointsPerDay:
          type: integer
          minimum: 1
          description: Puntos al completar el h?bito
        penalty:
          type: integer
          minimum: 0
          description: Puntos descontados si falla el h?bito
      required:
        - emoji
        - name
        - pointsPerDay
        - penalty

    UpdateHabitRequest:
      type: object
      properties:
        emoji:
          type: string
          description: Emoji que representa el h?bito
        name:
          type: string
          description: Nombre del h?bito
        pointsPerDay:
          type: integer
          minimum: 1
          description: Puntos al completar el h?bito
        penalty:
          type: integer
          minimum: 0
          description: Puntos descontados si falla el h?bito

    UpdateHabitEntryRequest:
      type: object
      properties:
        status:
          type: string
          enum: [pending, completed, failed]
          description: Nuevo estado de completitud del d?a
      required:
        - status

    HabitEntryResponse:
      type: object
      description: Respuesta de PATCH /api/habit-entries/{id}
      properties:
        id:
          type: integer
          description: Identificador de la entrada diaria
        status:
          type: string
          enum: [pending, completed, failed]
          description: Estado de completitud actualizado
        updatedAt:
          type: string
          format: date-time
          description: Fecha de ?ltima actualizaci?n (ISO 8601)
      required:
        - id
        - status
        - updatedAt

    WeekStats:
      type: object
      description: Estad?sticas agregadas de la semana visible
      properties:
        thisWeekPoints:
          type: integer
          description: Suma de snapshotPoints por entries completed
        lastWeekPoints:
          type: integer
          description: totalPointsEarned de la ?ltima semana bloqueada anterior
        penalties:
          type: integer
          description: Suma de snapshotPenalty por entries failed
        maxStreak:
          type: integer
          description: M?xima racha de completed consecutivos entre h?bitos
      required:
        - thisWeekPoints
        - lastWeekPoints
        - penalties
        - maxStreak

    WeekResponse:
      type: object
      description: Payload de GET /api/weeks/current y GET /api/weeks
      properties:
        week:
          type: object
          properties:
            id:
              type: integer
            startDate:
              type: string
              format: date-time
            endDate:
              type: string
              format: date-time
            isLocked:
              type: boolean
            totalPointsEarned:
              type: integer
            totalPenalties:
              type: integer
          required:
            - id
            - startDate
            - endDate
            - isLocked
            - totalPointsEarned
            - totalPenalties
        habits:
          type: array
          items:
            type: object
            properties:
              weekHabit:
                type: object
                properties:
                  id:
                    type: integer
                  habitId:
                    type: integer
                  order:
                    type: integer
                  snapshotName:
                    type: string
                  snapshotPoints:
                    type: integer
                  snapshotPenalty:
                    type: integer
                required:
                  - id
                  - habitId
                  - order
                  - snapshotName
                  - snapshotPoints
                  - snapshotPenalty
              entries:
                type: array
                minItems: 7
                maxItems: 7
                items:
                  type: object
                  properties:
                    id:
                      type: integer
                    dayIndex:
                      type: integer
                      minimum: 0
                      maximum: 6
                    status:
                      type: string
                      enum: [pending, completed, failed]
                  required:
                    - id
                    - dayIndex
                    - status
            required:
              - weekHabit
              - entries
        stats:
          $ref: '#/components/schemas/WeekStats'
        redemptions:
          type: array
          description: Vac?o hasta implementar canjes HTTP
          items:
            type: object
      required:
        - week
        - habits
        - stats
        - redemptions

    Reward:
      type: object
      description: Respuesta de persistencia para GET/POST /api/rewards
      properties:
        id:
          type: integer
          description: Identificador ?nico de la recompensa
        userId:
          type: integer
          description: ID del usuario propietario
        emoji:
          type: string
          description: Emoji que representa la recompensa
        name:
          type: string
          description: Nombre de la recompensa
        description:
          type: string
          description: Descripci?n de la recompensa
        cost:
          type: integer
          description: Puntos necesarios para canjear
        isActive:
          type: boolean
          description: Indica si la recompensa est? activa (soft delete)
        createdAt:
          type: string
          format: date-time
          description: Fecha de creaci?n de la recompensa
      required:
        - id
        - userId
        - emoji
        - name
        - description
        - cost
        - isActive
        - createdAt

    CreateRewardRequest:
      type: object
      properties:
        emoji:
          type: string
          description: Emoji que representa la recompensa
        name:
          type: string
          description: Nombre de la recompensa
        description:
          type: string
          description: Descripci?n de la recompensa
        cost:
          type: integer
          minimum: 1
          description: Puntos necesarios para canjear
      required:
        - emoji
        - name
        - description
        - cost

    ApiErrorResponse:
      type: object
      description: Respuesta de error est?ndar del middleware errorHandler
      required:
        - code
        - message
      properties:
        code:
          type: string
          description: C?digo de error estable en ingl?s (p. ej. VALIDATION_ERROR, INTERNAL_ERROR)
        message:
          type: string
          description: Mensaje legible para el usuario en espa?ol
        details:
          description: Detalles opcionales (array de campos de validaci?n u objeto)
        stack:
          type: string
          description: Stack trace; solo presente cuando NODE_ENV !== production

    LegacyErrorResponse:
      type: object
      description: Formato legacy de error (pendiente migraci?n en T-06-01)
      properties:
        error:
          type: string
          description: Mensaje de error (en espa?ol para el usuario)
      required:
        - error

    ErrorResponse:
      type: object
      deprecated: true
      description: Alias legacy; preferir ApiErrorResponse
      properties:
        error:
          type: string
          description: Mensaje de error (en espa?ol para el usuario)
      required:
        - error

tags:
  - name: Usuario
    description: Operaciones de perfil de usuario
  - name: H?bitos
    description: Seguimiento y gesti?n de h?bitos
  - name: Semanas
    description: Semana activa e hist?rico semanal
  - name: Recompensas
    description: Gesti?n y canje de recompensas
